name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver module tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  COVERAGE_THRESHOLD: "90.0"
  SCAFFOLD_REPOSITORY: zxzharmlesszxz/prometheus-exporter-scaffold

defaults:
  run:
    shell: bash

jobs:
  tag-module:
    name: Tag Go module
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine

    steps:
      - name: Prepare Alpine
        shell: sh
        run: apk add --no-cache bash build-base git github-cli make perl

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Validate release input
        env:
          VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "Release workflow must run from $DEFAULT_BRANCH, got $GITHUB_REF_NAME"
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^v(0|1)\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "version must look like v0.1.0, v1.2.3, or v1.2.3-rc.1"
            echo "v2+ requires a /v2 module path before it can be released"
            exit 1
          fi

      - name: Validate scaffold access
        env:
          GH_TOKEN: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SCAFFOLD_REPO_TOKEN is required to verify and notify $SCAFFOLD_REPOSITORY"
            exit 1
          fi

          gh repo view "$SCAFFOLD_REPOSITORY" --json nameWithOwner -q .nameWithOwner >/dev/null

      - name: Check version is releasable
        id: version_state
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force origin "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"

          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release already exists: $VERSION"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            tag_type="$(git cat-file -t "refs/tags/$VERSION")"
            if [ "$tag_type" != "tag" ]; then
              echo "existing tag must be annotated: $VERSION"
              exit 1
            fi

            tag_target="$(git rev-parse "refs/tags/$VERSION^{}")"
            if [ "$tag_target" != "$GITHUB_SHA" ]; then
              if ! git merge-base --is-ancestor "$tag_target" "origin/$DEFAULT_BRANCH"; then
                echo "existing tag $VERSION at $tag_target is not reachable from origin/$DEFAULT_BRANCH"
                exit 1
              fi
            fi

            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "release_commit=$tag_target" >> "$GITHUB_OUTPUT"
            echo "Reusing existing tag $VERSION at $tag_target"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "release_commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tagged commit
        if: steps.version_state.outputs.tag_exists == 'true'
        env:
          RELEASE_COMMIT: ${{ steps.version_state.outputs.release_commit }}
        run: git switch --detach "$RELEASE_COMMIT"

      - name: Verify module files
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp go.mod "$tmp/go.mod"
          cp go.sum "$tmp/go.sum"
          go mod tidy
          diff -u "$tmp/go.mod" go.mod
          diff -u "$tmp/go.sum" go.sum

      - name: Run checks
        run: make check GO=go GOFMT=gofmt COVERAGE_THRESHOLD="$COVERAGE_THRESHOLD"

      - name: Checkout scaffold for preflight
        if: steps.version_state.outputs.tag_exists != 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SCAFFOLD_REPOSITORY }}
          token: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
          path: scaffold-preflight

      - name: Trust scaffold preflight checkout directory
        if: steps.version_state.outputs.tag_exists != 'true'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/scaffold-preflight"

      - name: Preflight scaffold consumption
        if: steps.version_state.outputs.tag_exists != 'true'
        working-directory: scaffold-preflight
        env:
          FRAMEWORK_PATH: ${{ github.workspace }}
          VERSION: ${{ inputs.version }}
        run: |
          go mod edit \
            -require=github.com/zxzharmlesszxz/prometheus-exporter-framework@"$VERSION" \
            -replace=github.com/zxzharmlesszxz/prometheus-exporter-framework="$FRAMEWORK_PATH" \
            template/go.mod
          (cd template && go mod tidy)

          find . -type f \( -name '*.md' -o -name '*.go' -o -name '*.mod' \) -print0 \
            | xargs -0 perl -0pi -e 's#github\.com/zxzharmlesszxz/prometheus-exporter-framework v[0-9A-Za-z.+-]+#github.com/zxzharmlesszxz/prometheus-exporter-framework $ENV{VERSION}#g'

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          scripts/render.sh \
            --project-name prometheus-demo-exporter \
            --module github.com/zxzharmlesszxz/prometheus-demo-exporter \
            --description "Prometheus Demo Exporter" \
            --feature-name demo \
            --namespace demo_exporter \
            --port 9888 \
            --target-dir "$tmp"
          (cd "$tmp" && go mod edit -replace=github.com/zxzharmlesszxz/prometheus-exporter-framework="$FRAMEWORK_PATH" && go mod tidy && make go-check GO=go GOFMT=gofmt)

      - name: Create annotated tag
        if: steps.version_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine
    needs:
      - tag-module

    steps:
      - name: Prepare Alpine
        shell: sh
        run: apk add --no-cache bash github-cli

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "$VERSION" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$VERSION"

  notify-scaffold:
    name: Notify exporter scaffold
    runs-on: ubuntu-24.04
    container:
      image: golang:1.26.3-alpine
    needs:
      - publish-release

    steps:
      - name: Prepare Alpine
        shell: sh
        run: apk add --no-cache bash github-cli

      - name: Open scaffold update issue
        env:
          GH_TOKEN: ${{ secrets.SCAFFOLD_REPO_TOKEN }}
          VERSION: ${{ inputs.version }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SCAFFOLD_REPO_TOKEN is required to open an issue in $SCAFFOLD_REPOSITORY"
            exit 1
          fi

          title="Update prometheus-exporter-framework to $VERSION"
          existing_issue="$(
            gh issue list \
              --repo "$SCAFFOLD_REPOSITORY" \
              --state open \
              --search "$VERSION in:title" \
              --json title,url \
              --jq ".[] | select(.title == \"$title\") | .url" \
              | head -n 1
          )"
          if [ -n "$existing_issue" ]; then
            echo "scaffold update issue already exists: $existing_issue"
            exit 0
          fi

          body="$(mktemp)"
          cat > "$body" <<EOF
          prometheus-exporter-framework $VERSION has been released.

          Release: $RELEASE_URL

          Please update the scaffold as the framework consumer:

          - template/go.mod (bump framework version)
          - template/go.sum (go mod tidy)
          - generated-template files that need API cleanup

          Suggested validation:

          - make check GO=go GOFMT=gofmt COVERAGE_THRESHOLD=90.0
          - render a demo exporter and run make go-check

          The framework release workflow already ran scaffold preflight against the release candidate. This issue is the handoff for the scaffold repository to consume the published tag.
          EOF

          gh issue create \
            --repo "$SCAFFOLD_REPOSITORY" \
            --title "$title" \
            --body-file "$body"
